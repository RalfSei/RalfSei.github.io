<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Früh Theme setzen, FOUC vermeiden -->
  <script>
  (function () {
    try {
      var d = document.documentElement;
      var saved = localStorage.getItem("theme");
      if (saved === "dark" || saved === "light") {
        d.setAttribute("data-theme", saved);
      } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
        d.setAttribute("data-theme", "dark");
      } else {
        d.setAttribute("data-theme", "light");
      }
    } catch (e) {}
  })();
  </script>

  <!-- Dein Stylesheet (nur dieses!) -->
  <link rel="stylesheet" href="{{ '/assets/css/style.cleaned.css' | relative_url }}">
  <style>
    .sidebar-external {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(128, 128, 128, 0.5);
      font-size: 0.95rem;
    }
    .sidebar-external a { font-weight: 600; text-decoration: none; }
    .sidebar-external a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Toggle-Button -->
  <button id="theme-toggle" class="theme-toggle" aria-pressed="false" onclick="toggleTheme()">🌙 Dark Mode</button>

  <div class="container">
    <aside class="sidebar">
      {% include sidebar.html %}

      {% if site.portfolio_url %}
      <p class="sidebar-external">
        <a href="{{ site.portfolio_url }}" rel="noopener">↗ Portfolio &amp; Profil</a>
      </p>
      {% endif %}
    </aside>

    <main class="content" role="main">
      {{ content }}
      {% include page-nav.html %}
    </main>
  </div>

  {% include footer.html %}

  {% comment %} Scripts ans Ende {% endcomment %}
  <script src="{{ '/assets/js/dark-mode.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/section-icons.js' | relative_url }}" defer></script>
</body>
</html>
